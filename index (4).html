<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMR Dashboard — Secure Access</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg1:#09111f; --gold:#e8933a; --gold2:#f5a623;
    --text:#f0f4ff; --sub:#8fa3c0; --line:rgba(255,255,255,0.07);
    --success:#00c97d; --danger:#e8404a;
  }
  html, body { width:100%; height:100%; background:var(--bg1); color:var(--text); font-family:'Inter',sans-serif; overflow:hidden; }
  body::before {
    content:''; position:fixed; inset:0; z-index:0;
    background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px);
    background-size:28px 28px;
  }
  body::after {
    content:''; position:fixed; width:700px; height:700px; border-radius:50%;
    background:radial-gradient(circle,rgba(13,27,53,0.9) 0%,transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%); z-index:0;
  }
  .bottom-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    border-top:1px solid var(--line); height:36px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; font-family:'DM Mono',monospace;
    font-size:0.58rem; color:rgba(143,163,192,0.5); letter-spacing:0.06em;
  }
  .bottom-bar .gold { color:var(--gold); opacity:0.7; }
  .live-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--success); margin-right:7px; animation:blink 2.5s ease-in-out infinite; vertical-align:middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .wrapper { position:relative; z-index:5; width:100%; height:100%; display:flex; align-items:center; justify-content:center; padding:20px 20px 52px; }
  #loginCard {
    width:100%; max-width:400px; background:#0d1625;
    border:1px solid rgba(255,255,255,0.08);
    border-top:1px solid rgba(255,255,255,0.13);
    border-radius:0;
    box-shadow:0 2px 0 0 var(--gold),0 32px 64px rgba(0,0,0,0.6),0 0 0 1px rgba(0,0,0,0.4);
    animation:cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .card-head { padding:28px 32px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
  .pm-badge { width:44px; height:44px; background:linear-gradient(145deg,var(--gold2),var(--gold)); display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; color:#0a1220; letter-spacing:0.05em; font-family:'Inter',sans-serif; flex-shrink:0; border-radius:4px; }
  .head-text { flex:1; }
  .head-title { font-size:1rem; font-weight:600; color:var(--text); letter-spacing:-0.01em; line-height:1.2; }
  .head-sub { font-size:0.7rem; font-weight:400; color:var(--gold); margin-top:3px; letter-spacing:0.04em; opacity:0.8; }
  .section-label { padding:14px 32px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.2); }
  .section-label span { font-size:0.62rem; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--sub); }
  .status-pills { display:flex; gap:10px; align-items:center; }
  .pill { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.08em; color:var(--sub); display:flex; align-items:center; gap:4px; }
  .pill .dot { width:4px; height:4px; border-radius:50%; }
  .pill .dot.g { background:var(--success); }
  .pill .dot.o { background:var(--gold); }
  .card-body { padding:28px 32px 32px; }
  .field-label { font-size:0.68rem; font-weight:500; color:var(--sub); letter-spacing:0.06em; margin-bottom:8px; display:block; }
  .input-wrap { position:relative; margin-bottom:20px; }
  .pw-input { width:100%; padding:12px 42px 12px 14px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08); border-radius:0; color:var(--text); font-family:'DM Mono',monospace; font-size:0.88rem; letter-spacing:0.1em; outline:none; transition:border-color 0.15s,box-shadow 0.15s; }
  .pw-input:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(232,147,58,0.12); background:rgba(0,0,0,0.4); }
  .pw-input::placeholder { color:rgba(143,163,192,0.4); font-size:0.75rem; letter-spacing:0.04em; }
  .toggle-eye { position:absolute; right:13px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:0.78rem; opacity:0.3; transition:opacity 0.15s; user-select:none; }
  .toggle-eye:hover { opacity:0.7; }
  .btn-access { width:100%; padding:13px 20px; background:linear-gradient(135deg,#c47820,var(--gold2)); border:none; border-radius:0; color:#0a1220; font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; transition:opacity 0.15s,transform 0.1s; position:relative; overflow:hidden; }
  .btn-access:hover { opacity:0.88; }
  .btn-access:active { transform:scale(0.99); }
  .btn-access::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent); transform:translateX(-100%); animation:shimmer 4s ease-in-out infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 40%,100%{transform:translateX(150%)} }
  .error-msg { display:none; font-size:0.65rem; font-weight:500; color:var(--danger); margin-top:12px; padding:9px 12px; background:rgba(232,64,74,0.06); border-left:2px solid var(--danger); letter-spacing:0.03em; }
  .error-msg.show { display:flex; align-items:center; gap:7px; animation:shake 0.25s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .card-foot { padding:14px 32px; border-top:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,0.15); }
  .foot-l,.foot-r { font-family:'DM Mono',monospace; font-size:0.52rem; letter-spacing:0.06em; color:rgba(143,163,192,0.4); line-height:1.7; }
  .foot-r { text-align:right; }
  .foot-r .gold { color:rgba(232,147,58,0.55); }
  /* Dashboard iframe — hidden until unlocked */
  #dashFrame { display:none; position:fixed; inset:0; width:100vw; height:100vh; border:none; z-index:20; }
</style>
</head>
<body>

<div class="wrapper">
  <div id="loginCard">
    <div class="card-head">
      <div class="pm-badge">PM</div>
      <div class="head-text">
        <div class="head-title">Precise Mechanical Repairs</div>
        <div class="head-sub">Executive Performance Dashboard</div>
      </div>
    </div>
    <div class="section-label">
      <span>Secure Access</span>
      <div class="status-pills">
        <div class="pill"><div class="dot g"></div>Online</div>
        <div class="pill"><div class="dot o"></div>Encrypted</div>
        <div class="pill" id="clock" style="font-family:'DM Mono',monospace;font-size:0.52rem;color:var(--sub);">--:--:--</div>
      </div>
    </div>
    <div class="card-body">
      <label class="field-label">Access Password</label>
      <div class="input-wrap">
        <input class="pw-input" id="pwInput" type="password" placeholder="Enter password" autocomplete="current-password">
        <span class="toggle-eye" onclick="togglePw()">👁</span>
      </div>
      <button class="btn-access" id="accessBtn" onclick="checkPw()">Enter Dashboard</button>
      <div class="error-msg" id="errorMsg"><span>⚠</span> Incorrect password. Please try again.</div>
    </div>
    <div class="card-foot">
      <div class="foot-l">TLS 1.3 SECURED<br>AUTHORIZED USE ONLY</div>
      <div class="foot-r">Powered by <span class="gold">A2Y.ca</span><br>© 2026 PMR</div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div><span class="live-dot"></span><span class="gold">A2Y.ca</span> — Authorized Hosting Partner</div>
  <div id="dateBar"></div>
  <div>pmr-dashboard.a2y.ca</div>
</div>

<!-- Dashboard loads here after login -->
<iframe id="dashFrame"
  src="https://script.google.com/macros/s/AKfycbxGTRCRpwpONtl0SvhogScbljF0emCwngn1vcqnOpBYzcaqMeVfStMmdgIy7Y2iiZ8cXw/exec"
  allowfullscreen scrolling="yes" title="Precise Mechanical Executive Dashboard">
</iframe>

<script>
  // Simple hash check — password never stored in plain text
  async function hashPw(pw) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  const CORRECT_HASH = 'a719f3e00459ea50075cab7efd61d02aab93d8f69226071ee12ba829e03b5360';

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toTimeString().slice(0,8);
    document.getElementById('dateBar').textContent = now.toDateString();
  }
  setInterval(updateClock, 1000);
  updateClock();

  function togglePw() {
    const inp = document.getElementById('pwInput');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function checkPw() {
    const val = document.getElementById('pwInput').value;
    const err = document.getElementById('errorMsg');
    const btn = document.getElementById('accessBtn');
    const hashed = await hashPw(val);
    if (hashed === CORRECT_HASH) {
      btn.textContent = '✓  Access Granted';
      btn.style.background = 'linear-gradient(135deg,#006644,#00c97d)';
      btn.style.color = '#fff';
      err.classList.remove('show');
      setTimeout(() => {
        document.getElementById('loginCard').style.display = 'none';
        document.querySelector('.wrapper').style.display = 'none';
        document.querySelector('.bottom-bar').style.display = 'none';
        document.getElementById('dashFrame').style.display = 'block';
      }, 600);
    } else {
      err.classList.remove('show');
      void err.offsetWidth;
      err.classList.add('show');
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') checkPw(); });
</script>



</body>
</html>
